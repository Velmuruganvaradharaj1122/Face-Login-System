{% extends "base.html" %}

{% block layout %}
<div class="flex flex-1 flex-grow min-h-screen bg-[#242424]/90 backdrop-blur-md">
    <!-- Left Feature Panel -->
    <div class="hidden md:flex md:w-1/3 flex-col justify-center px-12 border-r border-white/5 bg-[#1e1e1e]/90">
        <div class="mb-12">
            <h1 class="text-3xl font-bold text-white flex items-center mb-2">
                <i class="far fa-square text-cyan-400 mr-3"></i> FaceAuth
            </h1>
            <p class="text-gray-400 text-sm">Secure facial recognition login</p>
        </div>

        <div class="space-y-8">
            <!-- Feature 1 -->
            <div class="flex items-start">
                <div class="w-10 h-10 rounded-lg bg-blue-500/10 border border-blue-500/20 flex items-center justify-center flex-shrink-0 mt-1">
                    <i class="fas fa-expand text-blue-400"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-white font-medium">Face recognition</h3>
                    <p class="text-sm text-gray-400">No password needed</p>
                </div>
            </div>
            <!-- Feature 2 -->
            <div class="flex items-start">
                <div class="w-10 h-10 rounded-lg bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center flex-shrink-0 mt-1">
                    <i class="fas fa-lock text-emerald-400"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-white font-medium">Encrypted</h3>
                    <p class="text-sm text-gray-400">Data stays local</p>
                </div>
            </div>
            <!-- Feature 3 -->
            <div class="flex items-start">
                <div class="w-10 h-10 rounded-lg bg-cyan-500/10 border border-cyan-500/20 flex items-center justify-center flex-shrink-0 mt-1">
                    <i class="fas fa-bolt text-cyan-400"></i>
                </div>
                <div class="ml-4">
                    <h3 class="text-white font-medium">Fast access</h3>
                    <p class="text-sm text-gray-400">Under 2 seconds</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Right Content Area -->
    <div class="flex-1 flex flex-col items-center justify-center p-8 relative">
        <div class="w-full max-w-xl mx-auto">
            {% block content %}{% endblock %}
        </div>
    </div>
</div>
{% endblock %}
